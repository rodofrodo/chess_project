name: Windows Qt Build

# 1. When should this robot run?
on:
  push:
    branches: [ "master" ] # Runs when you push to main
  pull_request:
    branches: [ "master" ] # Runs when someone makes a PR to main

jobs:
  build:
    # 2. What operating system should the server use?
    runs-on: windows-latest

    steps:
    # 3. Download your repository's code onto the server
    - name: Checkout code
      uses: actions/checkout@v4

    # 4. Install Qt (This is the magic step the default template is missing!)
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.10.0' # IMPORTANT: Change this to the exact Qt version you installed!
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'

    # 5. Run CMake to generate the build files
    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    # 6. Actually compile the C++ and QML into an .exe
    - name: Build Project
      run: cmake --build ${{github.workspace}}/build --config Release
